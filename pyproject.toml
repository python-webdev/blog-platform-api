[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 79
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.pylint.main]
ignore-paths = ["^alembic/.*$"]

[tool.pylint.typecheck]
generated-members = ["alembic.op.*", "alembic.context.*"]
